<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avalisa Trading Tool</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0f0f23; color: #e2e8f0;
      width: 300px; padding: 20px;
    }
    .logo { font-size: 18px; font-weight: 700; color: #a78bfa; margin-bottom: 6px; }
    .subtitle { font-size: 12px; color: #64748b; margin-bottom: 20px; }
    .info-box {
      background: #1a1a2e; border: 1px solid #2d2d5b; border-radius: 8px;
      padding: 14px; margin-bottom: 16px; font-size: 13px; line-height: 1.6;
    }
    .info-box .label { color: #94a3b8; font-size: 11px; margin-bottom: 4px; }
    .info-box .value { color: #e2e8f0; font-weight: 600; }
    .plan-badge {
      display: inline-block; padding: 2px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 700; text-transform: uppercase;
    }
    .plan-free { background: #1e3a5f; color: #60a5fa; }
    .plan-basic { background: #1a2e1a; color: #34d399; }
    .plan-lifetime { background: #2e1a3a; color: #a78bfa; }
    .btn {
      display: block; width: 100%; padding: 10px; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer; text-align: center;
      text-decoration: none; margin-bottom: 8px; transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #7c3aed; color: #fff; }
    .btn-outline { background: transparent; border: 1px solid #7c3aed; color: #a78bfa; }
    .btn-green { background: #059669; color: #fff; }
    .divider { border-top: 1px solid #2d2d5b; margin: 16px 0; }
    .footer { font-size: 11px; color: #475569; text-align: center; }
    .footer a { color: #7c3aed; text-decoration: none; }
    .not-on-po {
      text-align: center; color: #94a3b8; font-size: 13px; padding: 10px 0;
    }
    .not-on-po a { color: #a78bfa; }
    .section-title {
      font-size: 12px; font-weight: 700; color: #a78bfa; text-transform: uppercase;
      letter-spacing: 0.5px; margin-bottom: 10px;
    }
    .payout-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .payout-row label { font-size: 12px; color: #94a3b8; }
    .payout-input {
      background: #0f0f23; border: 1px solid #2d2d5b; border-radius: 6px;
      color: #e2e8f0; font-size: 12px; padding: 5px 8px; width: 72px;
      text-align: right;
    }
    .payout-input:focus { outline: none; border-color: #7c3aed; }
    .radio-group { display: flex; flex-direction: column; gap: 6px; }
    .radio-item {
      display: flex; align-items: center; gap: 8px; cursor: pointer;
      font-size: 12px; color: #cbd5e1;
    }
    .radio-item input[type="radio"] { accent-color: #7c3aed; cursor: pointer; }
    .radio-item .hint { color: #64748b; font-size: 11px; margin-left: 6px; }
  </style>
</head>
<body>
  <div class="logo">⚡ Avalisa Bot</div>
  <div class="subtitle">Trading Strategy Tool for Pocket Option</div>

  <div id="main-content">
    <div class="not-on-po" id="not-on-po" style="display:none">
      <p>Open <a href="https://pocketoption.com" target="_blank">pocketoption.com</a> to use the bot.</p>
    </div>

    <div id="on-po">
      <div class="info-box">
        <div class="label">Status</div>
        <div class="value" id="bot-status">Stopped</div>
      </div>
      <div class="info-box">
        <div class="label">Plan</div>
        <div id="plan-display"><span class="plan-badge plan-free">Free</span></div>
      </div>
      <div class="info-box">
        <div class="label">Trades Used</div>
        <div class="value" id="trades-display">Loading...</div>
      </div>

      <button class="btn btn-green" id="open-panel-btn">Open Bot Panel on Page</button>
      <a class="btn btn-primary" id="dashboard-link" href="#" target="_blank">Open Dashboard</a>

      <div class="divider"></div>

      <div class="section-title">Payout Monitor</div>
      <div class="payout-row">
        <label for="payout-min">Minimum payout %</label>
        <input id="payout-min" type="number" min="1" max="100" step="1" value="90" class="payout-input" />
      </div>
      <div class="radio-group">
        <label class="radio-item">
          <input type="radio" name="payout-action" value="stop" checked />
          <span>Stop bot</span>
          <span class="hint">— below threshold</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="payout-action" value="switch" />
          <span>Auto-switch</span>
          <span class="hint">— to highest-payout favorite</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="payout-action" value="keep" />
          <span>Keep trading</span>
          <span class="hint">— ignore payout</span>
        </label>
      </div>

      <div class="divider"></div>

      <a class="btn btn-outline" id="affiliate-link" href="#" target="_blank">
        Register Free PO Account
      </a>
    </div>
  </div>

  <div class="divider"></div>
  <div class="footer">
    <a href="#" id="pricing-link" target="_blank">Upgrade Plan</a> ·
    <a href="#" id="support-link" target="_blank">Support</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>

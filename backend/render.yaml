services:
  - type: web
    name: avalisa-po-bot-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm install && npx prisma migrate deploy && npx prisma generate
    # migrate runs at build time; start is clean node process only
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_AI_API_KEY
        sync: false
      - key: LEMONSQUEEZY_API_KEY
        sync: false
      - key: LEMONSQUEEZY_WEBHOOK_SECRET
        sync: false
      - key: LEMONSQUEEZY_STORE_ID
        sync: false
      - key: LEMONSQUEEZY_VARIANT_ID_BASIC
        sync: false
      - key: LEMONSQUEEZY_VARIANT_ID_LIFETIME
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false

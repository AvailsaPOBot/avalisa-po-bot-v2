services:
  - type: web
    name: avalisa-po-bot-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm install && npx prisma migrate deploy && npx prisma generate
    # migrate runs at build time; start is clean node process only
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_AI_API_KEY
        sync: false
      - key: WHOP_WEBHOOK_SECRET
        sync: false
      - key: WHOP_PLAN_ID_BASIC
        sync: false
      - key: WHOP_PLAN_ID_PRO
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: PUBLIC_BACKEND_URL
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: FACEBOOK_OAUTH_CLIENT_ID
        sync: false
      - key: FACEBOOK_OAUTH_CLIENT_SECRET
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
